# fly.toml app configuration file for AlgoTrader Institutional v2
app = "algotrader-institutional"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "trading_data"
  destination = "/data"

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////data/trading.db"
  API_HOST = "0.0.0.0"

[checks]
  [checks.status]
    port = 8000
    type = "http"
    interval = "30s"
    timeout = "5s"
    method = "get"
    path = "/health"
